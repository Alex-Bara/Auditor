<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
    <div id="app">
        <div id="screen-input">
            <p>1. Выбери площадку:</p>
            <div class="marketplace-selector">
                <input type="radio" id="wb" name="marketplace" value="wb" checked>
                <label for="wb">Wildberries</label>

                <input type="radio" id="ozon" name="marketplace" value="ozon">
                <label for="ozon">Ozon</label>
            </div>

            <p>2. Вставь API-ключ:</p>
            <div class="input-grop">
                <input type="text" id="api-key" placeholder="Токен (только чтение)">
            </div>
            <button class="main-button" onclick="runAudit()">Запустить сканирование</button>
        </div>
        <div id="screen-loading" style="display: none; text-align: center; padding-top: 50px;">
            <div class="spinner"></div>
            <p>Анализируем отчеты за 60 дней...</p>
        </div>
        <div id="screen-result" style="display:none;">
            <h2>Маркетплейс должен Вам: <span id="result-sum">0</span> ₽</h2>
            <div id="result-details" class=""></div>
    
            <button id="download-btn" class="secondary-button" style="display:none;" onclick="downloadPDF()">
                📥 Скачать претензию (PDF)
            </button>
            <div id="requisites-form" style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">
                <h4>Данные для претензии:</h4>
                <div class="input-grop">
                    <input type="text" id="seller-name" placeholder="ФИО ИП или Название ООО" class="main-input">
                    <input type="text" id="seller-inn" placeholder="ИНН" class="main-input">
                    <input type="text" id="seller-address" placeholder="Юридический адрес" class="main-input">
                    <input type="text" id="seller-bik" placeholder="БИК банка" class="main-input">
                    <input type="text" id="seller-account" placeholder="Номер счета (20 знаков)" class="main-input">
                </div>
            </div>
    
            <div id="unlock-container" style="display: none; text-align: center; margin-top: 20px;">
                <p style="font-size: 13px; color: var(--tg-hint); margin-bottom: 10px;">
                     Найдено расхождений на сумму <span id="found-sum-hint" style="font-weight: bold; color: var(--tg-text);">0</span> ₽.
                     Чтобы увидеть детали и скачать претензию, разблокируйте полный отчет.
                </p>
                <button class="btn-primary" onclick="payAndUnlock()" style="background: var(--success);">
                    Разблокировать за ⭐️ 50
                </button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
